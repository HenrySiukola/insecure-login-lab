{#
    Vulnerable search page.

    SECURITY NOTE:
    User-controlled search input is intentionally rendered
    using `|safe` to demonstrate reflected XSS vulnerabilities.
#}

{% extends "base.html" %}
{% block title %}Search{% endblock %}

{% block content %}
  <h2>Search</h2>

  <form method="get" action="{{ url_for('main.search') }}" class="form">
    <label>Search term</label>
    <input name="q" value="{{ q }}">
    <button type="submit">Search</button>
  </form>

  <p>You searched for:</p>

  <!-- intentionally vulnerable -->
  <div class="message">{{ q|safe }}</div>
{% endblock %}
