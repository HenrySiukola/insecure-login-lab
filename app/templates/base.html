<!doctype html>
<!--
    Base layout template shared by all pages.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Insecure Login Lab{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1>Insecure Login Lab</h1>

      <nav>
        {% if current_user %}
          <span>Logged in as {{ current_user.username }}</span>
          <a href="{{ url_for('main.profile') }}">Profile</a>
          <a href="{{ url_for('main.search') }}">Search</a>
          <a href="{{ url_for('main.uploads') }}">Uploads</a>

          {% if current_user.get("role") == "admin" %}
            <a href="{{ url_for('main.admin') }}">Admin</a>
          {% endif %}

          <a href="{{ url_for('auth.logout') }}">Logout</a>
        {% else %}
          <a href="{{ url_for('auth.index') }}">Login</a>
          <a href="{{ url_for('auth.register') }}">Register</a>
        {% endif %}
      </nav>
    </header>

    <main class="card">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
